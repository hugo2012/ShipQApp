specVersion: "3.1"
metadata:
  name: com.bosch.scm.shipq
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        backend:
          - path: /sap
            url: http://a1m-https-sso:42
            client: "011"
            destination: A1M
          - url: http://a1m-https-sso:42
            client: '011'
            authenticationType: PrincipalPropagation
            destination: A1M
            path: /sap/opu/odata4/rb1m/sd_u_shpq_doc_fetch/srvd_a2x/rb1m/sd_shpq_doc_fetch/0001/
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: com.bosch.scm.shipq
        ui5Theme: sap_fiori_3
